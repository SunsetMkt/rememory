name: PR Review

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: eljojo/no-autopilot@v1
        with:
          guidelines-url: 'https://github.com/eljojo/rememory/blob/main/AGENTS.md'
